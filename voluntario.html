<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Seja um Voluntário - Monitoria Solidária</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Monitoria Solidária</h1>
            </div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="quem-somos.html">Quem Somos</a></li>
                <li><a href="proposta.html">A Proposta</a></li>
                <li><a href="voluntario.html">Seja um Voluntário</a></li>
                <li><a href="galeria.html">Galeria/Impacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Seja um Voluntário</h2>
            <p>Junte-se a nós e faça a diferença! Preencha o formulário abaixo para se cadastrar como tutor voluntário.</p>
            <form id="voluntario-form">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>
                
                <label for="serie">Série:</label>
                <select id="serie" required>
                    <option value="6">6º ano</option>
                    <option value="7">7º ano</option>
                    <option value="8">8º ano</option>
                    <option value="9">9º ano</option>
                    <option value="ensino-medio">Ensino Médio</option>
                </select>
                
                <label for="disponibilidade">Disponibilidade (dias da semana):</label>
                <select id="disponibilidade" multiple required>
                    <option value="segunda">Segunda-feira</option>
                    <option value="terca">Terça-feira</option>
                    <option value="quarta">Quarta-feira</option>
                    <option value="quinta">Quinta-feira</option>
                    <option value="sexta">Sexta-feira</option>
                </select>
                
                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Monitoria Solidária. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
